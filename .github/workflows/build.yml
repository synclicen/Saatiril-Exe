# SAATIRIL — GitHub Actions CI/CD
# Builds Electron desktop apps for Windows, macOS, and Linux
# Triggered on push to main branch and manual dispatch

name: Build SAATIRIL Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ─── Build job ──────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: SAATIRIL-Setup
          - os: macos-latest
            platform: mac
            artifact: SAATIRIL-macOS
          - os: ubuntu-22.04
            platform: linux
            artifact: SAATIRIL-Linux

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Setup Bun ─────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Setup Node.js (for Electron build) ───────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Linux dependencies (Ubuntu 22.04) ────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xauth xvfb libasound2-dev libgbm-dev

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install main project dependencies
        run: bun install

      - name: Install Socket.io server dependencies
        run: cd mini-services/saatiril-socket && bun install

      # ── Build Next.js ────────────────────────────────────────────────────
      - name: Build Next.js (standalone)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # ── Copy static files for standalone ──────────────────────────────────
      - name: Copy static files for standalone
        shell: bash
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/

      # ── Prepare Socket.io server for production ──────────────────────────
      - name: Prepare Socket.io server
        shell: bash
        run: |
          cd mini-services/saatiril-socket
          # index.js already exists as CommonJS version

      # ── Install Electron builder ─────────────────────────────────────────
      - name: Install Electron
        run: bun add -d electron electron-builder

      # ── Build Electron app ───────────────────────────────────────────────
      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-electron/*.*
          retention-days: 30

  # ─── Release job (only on version tags) ─────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download all artifacts
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SAATIRIL-Setup
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SAATIRIL-macOS
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SAATIRIL-Linux
          path: release/

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SAATIRIL ${{ github.ref_name }}
          body: |
            ## SAATIRIL — Sistem Auto Track Input Raw into Live

            ### 📦 Download
            - **Windows**: `SAATIRIL-Setup-x.x.x.exe` — Installer untuk Windows
            - **macOS**: `SAATIRIL-x.x.x.dmg` — Installer untuk macOS
            - **Linux**: `SAATIRIL-x.x.x.AppImage` — Portable untuk Linux

            ### 🚀 Cara Penggunaan
            1. Download installer sesuai sistem operasi
            2. Install dan jalankan SAATIRIL
            3. Pastikan semua perangkat terhubung ke jaringan WiFi/LAN yang sama
            4. Perangkat lain bisa akses melalui IP yang ditampilkan di aplikasi

            ### 📋 Persyaratan
            - Kamera USB atau webcam
            - Jaringan LAN/WiFi untuk koneksi multi-perangkat
            - Browser modern (untuk perangkat yang mengakses via web)
          files: release/*.*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
