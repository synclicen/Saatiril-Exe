# SAATIRIL — GitHub Actions CI/CD (Windows Only)
# Builds Electron desktop app for Windows

name: Build SAATIRIL Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Setup Bun ─────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: bun install

      # ── Build Next.js (static export) ─────────────────────────────────────
      - name: Build Next.js (static export)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # ── Install Electron ──────────────────────────────────────────────────
      - name: Install Electron
        run: bun add -d electron electron-builder

      # ── Build Electron app (Windows NSIS installer) ───────────────────────
      - name: Build Electron app
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAATIRIL-Setup
          path: dist-electron/*.exe
          retention-days: 90

  # ─── Release job (only on version tags) ─────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: SAATIRIL-Setup
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SAATIRIL ${{ github.ref_name }}
          body: |
            ## SAATIRIL — Sistem Auto Track Input Raw into Live

            ### 📦 Download
            Download `SAATIRIL-Setup-x.x.x.exe` lalu install.

            ### 🚀 Cara Penggunaan
            1. Download dan install SAATIRIL
            2. Jalankan aplikasi — kamera otomatis terdeteksi
            3. Untuk multi-perangkat, buka browser di perangkat lain dan akses IP yang ditampilkan

            ### 📋 Persyaratan
            - Windows 10/11 (64-bit)
            - Kamera USB atau webcam
            - Jaringan LAN/WiFi untuk koneksi multi-perangkat
          files: release/*.*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
