# SAATIRIL — electron-builder configuration (Windows Only)
# https://www.electron.build/configuration/configuration

appId: com.saatiril.app
productName: SAATIRIL
copyright: Copyright © 2025 SAATIRIL

# ─── Directories ─────────────────────────────────────────────────────────────
directories:
  buildResources: electron/build
  output: dist-electron

# ─── Files to include in the packaged app ────────────────────────────────────
# Only the Electron wrapper code, NOT node_modules or src/
files:
  - electron/main.js
  - electron/preload.js
  - "!electron/build/**"

# Extra resources: Next.js static export + Socket.io for in-process server
extraResources:
  - from: out
    to: app
    filter:
      - "**/*"

# ─── Windows build ───────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SAATIRIL
  uninstallDisplayName: SAATIRIL

# ─── Build metadata ──────────────────────────────────────────────────────────
buildVersion: "1.0.0"
