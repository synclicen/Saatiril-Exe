# SAATIRIL — electron-builder configuration (Windows Only)
# https://www.electron.build/configuration/configuration

appId: com.saatiril.app
productName: SAATIRIL
copyright: Copyright © 2025 SAATIRIL

# ─── Directories ─────────────────────────────────────────────────────────────
directories:
  buildResources: electron/build
  output: dist-electron

# ─── Files to include in the packaged app ────────────────────────────────────
# Only the Electron wrapper code, NOT node_modules or src/
files:
  - electron/main.js
  - electron/preload.js
  - "!electron/build/**"
  # Exclude heavy native deps not needed by Electron main process
  - "!node_modules/sharp/**/*"
  - "!node_modules/@img/**/*"
  - "!node_modules/@parcel/watcher/**/*"
  - "!node_modules/@tensorflow/**/*"
  - "!node_modules/@mdxeditor/**/*"
  - "!node_modules/@next/swc-*/**/*"
  - "!node_modules/@swc/core-*/**/*"
  - "!node_modules/better-sqlite3/**/*"
  - "!node_modules/.prisma/**/*"
  - "!node_modules/@prisma/engines/**/*"
  - "!node_modules/prisma/**/*"

# Extra resources: Next.js static export (served by HTTP server in main.js)
extraResources:
  - from: out
    to: app
    filter:
      - "**/*"

# ─── Skip native module rebuild ──────────────────────────────────────────────
# Electron main process only uses socket.io (pure JS) and Node built-ins.
# No native modules need rebuilding. Skipping prevents node-gyp errors.
npmRebuild: false

# ─── Windows build ───────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SAATIRIL
  uninstallDisplayName: SAATIRIL
  deleteAppDataOnUninstall: true

# ─── Build metadata ──────────────────────────────────────────────────────────
buildVersion: "1.0.0"
