# SAATIRIL — electron-builder configuration
# https://www.electron.build/configuration/configuration

appId: com.saatiril.app
productName: SAATIRIL
copyright: Copyright © 2025 SAATIRIL

# ─── Directories ─────────────────────────────────────────────────────────────
directories:
  buildResources: electron/build
  output: dist-electron

# ─── Files to include in the packaged app ────────────────────────────────────
files:
  - electron/**/*
  - "!electron/build/**"

# Extra resources: Next.js standalone build + Socket.io server + public assets
extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"
  - from: mini-services/saatiril-socket/index.js
    to: socket-server/index.js
  - from: mini-services/saatiril-socket/package.json
    to: socket-server/package.json

# ─── Platform-specific builds ────────────────────────────────────────────────

# Windows
win:
  target:
    - target: portable
      arch:
        - x64
  # icon: electron/build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SAATIRIL

# macOS — no code signing in CI, use ad-hoc
mac:
  target:
    - target: zip
      arch:
        - x64
        - arm64
  # icon: electron/build/icon.icns
  category: public.app-category.photography
  identity: null

# Linux
linux:
  target:
    - target: AppImage
      arch:
        - x64
  # icon: electron/build
  category: Photography
  maintainer: SAATIRIL Team

# ─── Build metadata ──────────────────────────────────────────────────────────
buildVersion: "1.0.0"
